<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A6FFF"/>
      <stop offset="100%" stop-color="#0A4FCC"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8192C"/>
      <stop offset="100%" stop-color="#B80F20"/>
    </linearGradient>
    <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Icon badge -->
  <rect x="0" y="4" width="64" height="64" rx="14" fill="url(#lg1)" filter="url(#shadow)"/>
  <rect x="3" y="7" width="58" height="58" rx="12" fill="none" stroke="url(#lg3)" stroke-width="1.5"/>
  <!-- 19 numeral -->
  <text x="10" y="44" font-family="Georgia,serif" font-size="32" font-weight="900" fill="white" letter-spacing="-1">19</text>
  <!-- Crown above -->
  <path d="M20 12 L26 20 L32 10 L38 20 L44 12 L42 22 H22 Z" fill="url(#lg3)" opacity="0.95"/>
  <!-- Red accent bar -->
  <rect x="3" y="54" width="58" height="8" rx="0 0 12 12" fill="url(#lg2)" opacity="0.9"/>
  <!-- GameVIP text -->
  <text x="78" y="30" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="0.5">GAME</text>
  <text x="78" y="57" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="900" fill="url(#lg3)" letter-spacing="1">VIP</text>
  <!-- Dot separator -->
  <circle cx="168" cy="43" r="3" fill="url(#lg2)"/>
  <!-- Tagline -->
  <text x="178" y="48" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="400" fill="#8A9BB0" letter-spacing="2">PREMIUM GAMING</text>
</svg>
