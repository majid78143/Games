{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-primary)">
  <div style="width:100%;max-width:400px">
    <!-- Logo -->
    <div class="text-center mb-20" style="margin-bottom:28px">
      <img src="/static/svg/logo.svg" alt="19GameVIP" style="height:44px;margin:0 auto 12px">
      <p class="text-muted text-sm">Sign in to your premium account</p>
    </div>

    <!-- Card -->
    <div class="card" style="padding:24px">
      <h2 style="font-size:20px;font-weight:900;margin-bottom:20px">Welcome Back</h2>

      <!-- Error box -->
      <div id="error-box" style="display:none;background:rgba(232,25,44,0.1);border:1px solid rgba(232,25,44,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red-primary);margin-bottom:16px"></div>

      <!-- Email form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>
        <div class="form-group">
          <div class="flex-between" style="margin-bottom:6px">
            <label class="form-label" style="margin-bottom:0">Password</label>
            <a href="/auth/forgot-password" style="font-size:11px;color:var(--blue-primary)">Forgot password?</a>
          </div>
          <div class="input-group">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="input-toggle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          <span id="login-text">Sign In</span>
          <span class="spinner hidden" id="login-spinner"></span>
        </button>
      </form>

      <div style="display:flex;align-items:center;gap:12px;margin:16px 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span class="text-muted text-xs">or</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <!-- Google -->
      <button class="btn btn-ghost btn-block" id="google-btn" style="gap:10px">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <p class="text-center text-sm mt-16" style="margin-top:20px;color:var(--text-muted)">
        No account? <a href="/auth/register" style="color:var(--blue-primary);font-weight:700">Create one free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script type="module">
import { loginEmail, loginGoogle } from "/static/js/auth.js";
document.getElementById("login-form").addEventListener("submit", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("login-btn");
  const txt = document.getElementById("login-text");
  const spinner = document.getElementById("login-spinner");
  const errBox = document.getElementById("error-box");
  errBox.style.display = "none";
  btn.disabled = true; txt.classList.add("hidden"); spinner.classList.remove("hidden");
  try { await window.loginEmail(email, password); }
  catch(e) { errBox.textContent = e.message; errBox.style.display = "block"; btn.disabled = false; txt.classList.remove("hidden"); spinner.classList.add("hidden"); }
});
document.getElementById("google-btn").addEventListener("click", async () => {
  const errBox = document.getElementById("error-box");
  try { await window.loginGoogle(); }
  catch(e) { errBox.textContent = e.message; errBox.style.display = "block"; }
});
</script>
{% endblock %}
