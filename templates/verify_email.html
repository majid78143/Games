{% extends "base.html" %}
{% block title %}Verify Email{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:380px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:rgba(26,111,255,0.1);border:2px solid var(--blue-primary);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1A6FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <h2 style="font-size:22px;font-weight:900;margin-bottom:8px">Verify Your Email</h2>
    <p class="text-muted text-sm" style="margin-bottom:24px">We sent a verification link to your email. Click the link to activate your account.</p>
    <button class="btn btn-outline btn-block" id="resend-btn" style="margin-bottom:12px">Resend Verification Email</button>
    <a href="/auth/login" class="btn btn-ghost btn-block">Back to Login</a>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script type="module">
document.getElementById("resend-btn").addEventListener("click", async () => {
  try { await window.sendVerification(); showToast("Verification email sent","success"); }
  catch(e) { showToast("Could not send email","error"); }
});
</script>
{% endblock %}
