{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:100%;max-width:380px">
    <div class="text-center" style="margin-bottom:28px">
      <img src="/static/svg/logo.svg" alt="19GameVIP" style="height:40px;margin:0 auto 12px">
    </div>
    <div class="card" style="padding:24px">
      <h2 style="font-size:18px;font-weight:900;margin-bottom:8px">Reset Password</h2>
      <p class="text-muted text-sm" style="margin-bottom:20px">Enter your email and we will send you a reset link.</p>
      <div id="success-box" style="display:none;background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:8px;padding:12px;font-size:13px;color:#27AE60;margin-bottom:16px">Reset email sent. Check your inbox.</div>
      <div id="error-box" style="display:none;background:rgba(232,25,44,0.1);border:1px solid rgba(232,25,44,0.3);border-radius:8px;padding:10px;font-size:13px;color:var(--red-primary);margin-bottom:16px"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <button class="btn btn-primary btn-block" id="reset-btn">Send Reset Link</button>
      <p class="text-center text-sm" style="margin-top:16px;color:var(--text-muted)"><a href="/auth/login" style="color:var(--blue-primary)">Back to Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script type="module">
document.getElementById("reset-btn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const errBox = document.getElementById("error-box");
  const sucBox = document.getElementById("success-box");
  errBox.style.display = "none"; sucBox.style.display = "none";
  if (!email) { errBox.textContent = "Enter your email address."; errBox.style.display = "block"; return; }
  try {
    await window.forgotPassword(email);
    sucBox.style.display = "block";
  } catch(e) { errBox.textContent = e.message; errBox.style.display = "block"; }
});
</script>
{% endblock %}
